schema_version: "0.1"
task_type: "gpt_reconstruction_from_analysis"
purpose:
  summary: "Generate draft render.yaml and meta.yaml from analysis.v0.1 JSON."
  status: "minimal_first_pass"

input_contract:
  required:
    - "schema_version == analysis.v0.1"
    - "source_of_truth == observed"
    - "observed.note_events[]"
    - "source.ticks_per_quarter"
  optional:
    - "observed.tempo_map[]"
    - "observed.time_signatures[]"
    - "inferred.*"
    - "reference song path"
    - "song_intent yaml/json"

output_contract:
  render_yaml:
    role: "bootstrap_execution_spec"
    required_fields:
      - "schema_version"
      - "song_ref"
      - "title"
      - "format"
      - "transport"
      - "tracks"
      - "notes"
  meta_yaml:
    role: "support_metadata"
    required_fields:
      - "schema_version"
      - "song_ref"
      - "title"
      - "source_request"
      - "review"

reconstruction_policy:
  - "Prefer observed facts over inferred values."
  - "Never fabricate missing analysis facts as confirmed values."
  - "Keep unknowns and caveats in meta.review."
  - "Use provisional title when final title is unknown."
  - "Do not hardcode cat/neko song references."

mapping_guidance:
  schema_version:
    value: "render.v0.1"
  song_ref:
    policy: "Use temporary_id-based song_ref during reconstruction phase"
  title:
    policy: "Use inferred.provisional_title when available, else fallback to 'Provisional title'"
  format:
    value: "bootstrap"
    meaning: "Observed-faithful trial/bootstrap render, not normalized/final render"
  transport:
    bpm: "observed.tempo_map[0].bpm (fallback 120)"
    ppq: "source.ticks_per_quarter"
    time_signature: "observed.time_signatures[0] as numerator/denominator (fallback 4/4)"
  tracks:
    policy: "Single neutral primary track for minimal reconstruction"
    fixed_track:
      id: "primary"
      name: "Primary Track"
      instrument: "unknown_or_assumed"
      channel: "observed.note_events[0].channel (fallback 0)"
      source_track_index: "observed.note_events[0].track_index (fallback 0)"
  notes:
    mapping:
      track: "primary"
      pitch: "observed.note_events[].pitch"
      start: "convert start_tick -> bar:beat:tick"
      duration: "convert duration_ticks -> bar:beat:tick_delta"
      velocity: "observed.note_events[].velocity"

comparison_policy:
  default_generation: "disabled"
  opt_in_flag: "--with-comparison"
  input_priority:
    - "reference song path"
    - "song_intent yaml/json"
    - "unavailable"
  minimum_report_sections:
    - "target_analysis_path"
    - "generated_render_path"
    - "generated_meta_path"
    - "comparison_mode"
    - "short_summary"
    - "obvious_matches"
    - "obvious_differences"
    - "unresolved_items"
  optional_report_sections:
    - "compared_reference_path"
    - "used_song_intent_path"

not_in_scope_yet:
  - "finalize promotion to songs/"
  - "final song_id decision"
  - "advanced scoring or semantic inference"
  - "automatic section-level semantic understanding (e.g., single-note/chord phase split)"
  - "normalized render implementation and PPQ normalization"
